<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Générer le QR Code</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a237e, #0d47a1);
      min-height: 100vh;
      padding: 30px 20px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 35px 30px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo .icon { font-size: 50px; }
    .logo h1 { font-size: 22px; color: #1a237e; font-weight: 700; margin-top: 8px; }
    .logo p { color: #666; font-size: 14px; margin-top: 6px; line-height: 1.5; }

    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
    input, select {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      background: #fafafa;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: #1a237e; background: white; }

    .btn-generate {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1a237e, #0d47a1);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .btn-generate:hover { opacity: 0.9; }

    /* Résultat QR */
    .result { display: none; margin-top: 28px; text-align: center; }
    .result.visible { display: block; }
    .result-banner {
      background: #fff8e1;
      border-left: 4px solid #f9a825;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      color: #795548;
      margin-bottom: 20px;
      text-align: left;
    }
    #qr-container {
      display: inline-block;
      padding: 16px;
      background: white;
      border: 3px solid #1a237e;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(26,35,126,0.15);
    }
    .qr-label {
      margin-top: 12px;
      font-size: 14px;
      color: #555;
      font-weight: 600;
    }
    .qr-sublabel { font-size: 12px; color: #888; margin-top: 3px; }

    .btn-print {
      display: block;
      width: 100%;
      padding: 12px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 18px;
      transition: opacity 0.2s;
    }
    .btn-print:hover { opacity: 0.9; }

    .url-box {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 11px;
      color: #777;
      word-break: break-all;
      margin-top: 14px;
      text-align: left;
    }

    @media print {
      body { background: white; padding: 0; }
      .card { box-shadow: none; border-radius: 0; max-width: 100%; }
      .btn-generate, .btn-print, .form-group, .logo p, .url-box, .result-banner { display: none !important; }
      .result { display: block !important; }
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="icon">📷</div>
    <h1>Générer le QR Code de ma classe</h1>
    <p>Ce QR code sera scanné par vos étudiants à chaque cours.<br/>Vous n'avez besoin de le générer <strong>qu'une seule fois</strong> par matière.</p>
  </div>

  <div class="form-group">
    <label>URL de votre formulaire.html en ligne</label>
    <input type="url" id="url-formulaire" placeholder="https://votre-compte.github.io/gestion-presences/formulaire.html"/>
  </div>

  <div class="form-group">
    <label>Matière</label>
    <input type="text" id="matiere" placeholder="Ex: Mathématiques, Informatique..."/>
  </div>

  <div class="form-group">
    <label>Promotion / Classe</label>
    <select id="promotion">
      <option value="">— Choisir (optionnel) —</option>
      <option>Licence 1 (L1)</option>
      <option>Licence 2 (L2)</option>
      <option>Licence 3 (L3)</option>
      <option>Master 1 (M1)</option>
      <option>Master 2 (M2)</option>
      <option>BTS 1ère année</option>
      <option>BTS 2ème année</option>
      <option>DUT 1ère année</option>
      <option>DUT 2ème année</option>
    </select>
  </div>

  <button class="btn-generate" onclick="genererQR()">📷 Générer le QR Code</button>

  <!-- Résultat -->
  <div class="result" id="result">
    <div class="result-banner">
      ⚠️ <strong>Important :</strong> Imprimez ce QR code et affichez-le en classe. Les étudiants le scannent à chaque cours — la date change automatiquement.
    </div>
    <div id="qr-container"></div>
    <div class="qr-label" id="qr-label"></div>
    <div class="qr-sublabel" id="qr-sublabel"></div>
    <div class="url-box" id="qr-url"></div>
    <button class="btn-print" onclick="window.print()">🖨️ Imprimer le QR Code</button>
  </div>
</div>

<script>
  function genererQR() {
    const urlBase = document.getElementById('url-formulaire').value.trim();
    const matiere = document.getElementById('matiere').value.trim();
    const promotion = document.getElementById('promotion').value;

    if (!urlBase) { alert('Veuillez entrer l\'URL de votre formulaire.'); return; }
    if (!matiere) { alert('Veuillez entrer le nom de la matière.'); return; }

    // Construire l'URL avec les paramètres
    const params = new URLSearchParams();
    if (matiere) params.set('matiere', matiere);
    if (promotion) params.set('promotion', promotion);
    const urlFinale = urlBase + '?' + params.toString();

    // Vider et regénérer le QR
    const container = document.getElementById('qr-container');
    container.innerHTML = '';

    new QRCode(container, {
      text: urlFinale,
      width: 220,
      height: 220,
      colorDark: "#1a237e",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });

    document.getElementById('qr-label').textContent = '📚 ' + matiere + (promotion ? ' · ' + promotion : '');
    document.getElementById('qr-sublabel').textContent = 'Scannez avec votre téléphone';
    document.getElementById('qr-url').textContent = '🔗 ' + urlFinale;
    document.getElementById('result').classList.add('visible');
  }
</script>
</body>
</html>
